<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
const { useEffect, useRef, useState, useCallback } = React;


// ══════════════════════════════════════════════════════════════════════
//  ステッチ共通定数
// ══════════════════════════════════════════════════════════════════════
const STITCH_PER_ARC = 27;
const THREAD_RAISE   = 0.9;
const HIDE_FRAC      = 0.10;
const FADE_IN        = 0.22;
const N_SUB          = 10;

function envelope(t) {
  const u = Math.min(1, t / FADE_IN);
  return u * u * (3 - 2 * u);
}
function lerp3(a,b,t){ return [a[0]+t*(b[0]-a[0]),a[1]+t*(b[1]-a[1]),a[2]+t*(b[2]-a[2])]; }
function arcLenToIdx(arcLen, target) {
  let lo = 0, hi = arcLen.length - 1;
  while (lo < hi) { const mid=(lo+hi)>>1; arcLen[mid]<target?(lo=mid+1):(hi=mid); }
  return lo;
}

// ══════════════════════════════════════════════════════════════════════
//  ボールジオメトリファクトリ (Thompson 1998)
//
//  R_      : ボール半径 (mm)
//  y0_     : 縫い目パラメータ y₀ (mm)  ← seam の xy射影の最大 Y 座標
//  stitchW_: ステッチ端点の縫い目中心線からの横オフセット (mm)
//            MLB R×0.105  /  NPB M号 R×0.070（継ぎ目に近い・角度が浅い）
//
//  y₀/R の比較（スキルドキュメント仕様値）:
//    MLB 硬式球 : y₀=10.70mm / R=37.40mm → y₀/R=0.286（蛇行小）
//    NPB M号球  : y₀=14.00mm / R=36.00mm → y₀/R=0.389（蛇行大）
//    ※ 現行実装はMLBをS=1.25inから導出するため y₀≈15.4mm(y₀/R≈0.412)
//      NPBはスキル実測値 y₀=14.00mm を直接使用
// ══════════════════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════════
//  ボールジオメトリファクトリ (Thompson 1998)
//
//  R_          : ボール半径 (mm)
//  y0_         : 縫い目パラメータ y₀ (mm)
//  stitchW_    : ステッチ端点の縫い目中心線からの横オフセット (mm)
//                MLB R×0.105  /  NPB M号 R×0.070（継ぎ目に近い・角度が浅い）
//  stitchReach_: 各ステッチが交差点方向へ伸びる割合 [0.0–0.5]
//                0.5 = 交差点にちょうど接する（MLB・硬式球）
//                0.36 = 交差点の手前で止まる（NPB M号軟式球）
//                ※ 2 × stitchReach_ < 1.0 のとき交差部にギャップが生まれる
//
//  y₀/R の比較（スキルドキュメント仕様値）:
//    MLB 硬式球 : y₀=10.70mm / R=37.40mm → y₀/R=0.286（蛇行小）
//    NPB M号球  : y₀=14.00mm / R=36.00mm → y₀/R=0.389（蛇行大）
// ══════════════════════════════════════════════════════════════════════
function makeBallGeom(R_, y0_, stitchW_, stitchReach_ = 0.5, threadRaise_ = 0.9) {
  const x0_ = Math.sqrt(R_*R_ - y0_*y0_);
  const b0_ = R_ / Math.sqrt(2);
  const hFn_ = x => ((y0_ - b0_) / x0_) * x + b0_;
  const onSph_ = p => {
    const l = Math.sqrt(p[0]**2+p[1]**2+p[2]**2)||1;
    return [p[0]*R_/l, p[1]*R_/l, p[2]*R_/l];
  };

  // f(t) — 縫い目の xy射影
  function computeF_() {
    const pts = [];
    for (let i = 0; i <= 500; i++) {
      const t = -x0_ + 2 * x0_ * i / 500;
      const fy = t <= 0
        ? Math.sqrt(Math.max(0, R_*R_ - t*t - hFn_(-t)**2))
        : hFn_(t);
      pts.push({ t, f: fy });
    }
    return pts;
  }

  // 4弧データ（pts3, arcLen, qVecs）
  function buildArcData_(fPts) {
    const makeArc = (sf, sz, rev) => {
      const src  = rev ? [...fPts].reverse() : fPts;
      const pts3 = src.map(p => {
        const fy = sf * p.f;
        const z  = sz * Math.sqrt(Math.max(0, R_*R_ - p.t*p.t - p.f*p.f));
        return [p.t, fy, z];
      });
      const arcLen = [0];
      for (let i = 1; i < pts3.length; i++) {
        const dx=pts3[i][0]-pts3[i-1][0], dy=pts3[i][1]-pts3[i-1][1], dz=pts3[i][2]-pts3[i-1][2];
        arcLen.push(arcLen[i-1] + Math.sqrt(dx*dx+dy*dy+dz*dz));
      }
      const Np = pts3.length;
      const qVecs = []; let prevQ = null;
      for (let i = 0; i < Np; i++) {
        const ia=Math.max(0,i-3), ib=Math.min(Np-1,i+3);
        const pa=pts3[ia], pb=pts3[ib];
        const tx=pb[0]-pa[0], ty=pb[1]-pa[1], tz=pb[2]-pa[2];
        const tl=Math.sqrt(tx*tx+ty*ty+tz*tz)||1;
        const T=[tx/tl,ty/tl,tz/tl];
        const p=pts3[i], pl=Math.sqrt(p[0]**2+p[1]**2+p[2]**2)||1;
        const Ns=[p[0]/pl,p[1]/pl,p[2]/pl];
        const qx=T[1]*Ns[2]-T[2]*Ns[1], qy=T[2]*Ns[0]-T[0]*Ns[2], qz=T[0]*Ns[1]-T[1]*Ns[0];
        const ql=Math.sqrt(qx*qx+qy*qy+qz*qz)||1;
        let Q=[qx/ql,qy/ql,qz/ql];
        if (prevQ && Q[0]*prevQ[0]+Q[1]*prevQ[1]+Q[2]*prevQ[2] < 0) Q=[-Q[0],-Q[1],-Q[2]];
        qVecs.push(Q); prevQ=Q;
      }
      return { pts3, arcLen, totalLen: arcLen[arcLen.length-1], qVecs };
    };
    return [
      makeArc( 1,  1, false), makeArc( 1, -1, true ),
      makeArc(-1, -1, false), makeArc(-1,  1, true ),
    ];
  }

  // ステッチデータ（subPts + midRaw + T0w/T1w）
  function buildStitchData_(arcData, initSign = 1) {
    let globalSign = initSign;
    return arcData.map(arc => {
      const { pts3, arcLen, totalLen, qVecs } = arc;
      const step = totalLen / STITCH_PER_ARC;
      const bIdx = Array.from({length: STITCH_PER_ARC+1}, (_,k) =>
        arcLenToIdx(arcLen, Math.min(step*k, totalLen))
      );
      return Array.from({length: STITCH_PER_ARC}, (_,k) => {
        const i0=bIdx[k], i1=bIdx[k+1];
        const P0=pts3[i0], Q0=qVecs[i0];
        const P1=pts3[i1], Q1=qVecs[i1];
        const s = globalSign; globalSign = -globalSign;
        const A_base = onSph_([P0[0]+s*stitchW_*Q0[0], P0[1]+s*stitchW_*Q0[1], P0[2]+s*stitchW_*Q0[2]]);
        const B_base = onSph_([P1[0]-s*stitchW_*Q1[0], P1[1]-s*stitchW_*Q1[1], P1[2]-s*stitchW_*Q1[2]]);
        const subPts = Array.from({length: N_SUB + 1}, (_, i) => {
          const t    = i / N_SUB;
          // stitchReach_ で交差点手前で止まる。0.5=接触、<0.5=ギャップあり
          const base = lerp3(A_base, B_base, t * stitchReach_);
          const nrm  = Math.sqrt(base[0]**2+base[1]**2+base[2]**2)||1;
          const n    = [base[0]/nrm, base[1]/nrm, base[2]/nrm];
          const rise = threadRaise_ * envelope(t);
          return [base[0]+n[0]*rise, base[1]+n[1]*rise, base[2]+n[2]*rise];
        });
        // midRaw: ステッチ中央点（stitchReach の半分地点）
        const midRaw = lerp3(A_base, B_base, stitchReach_ * 0.5);

        // T0w / T1w: 縫い目曲線の接線ベクトル（ワールド座標）
        // フレネ枠: T（接線）, N（球面法線）, Q（ binormal）は直交
        //   Q = T × N と定義されているため T = N × Q で逆算できる
        const normVec = (v) => { const l=Math.sqrt(v[0]**2+v[1]**2+v[2]**2)||1; return [v[0]/l,v[1]/l,v[2]/l]; };
        const cross   = (a,b) => [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]];
        const N0w = normVec(P0);
        const N1w = normVec(P1);
        const T0w = normVec(cross(N0w, Q0));   // 縫い目接線 at P0
        const T1w = normVec(cross(N1w, Q1));   // 縫い目接線 at P1

        return { subPts, midRaw, T0w, T1w };
      });
    });
  }

  const fPts    = computeF_();
  const arcData = buildArcData_(fPts);
  const sd1     = buildStitchData_(arcData,  1);
  const sd2     = buildStitchData_(arcData, -1);
  const allMid  = [];
  for (const sd of [sd1, sd2])
    for (let ai=0; ai<4; ai++)
      for (const st of sd[ai]) allMid.push(st.midRaw);

  return { R: R_, threadRaise: threadRaise_, ARC_DATA: arcData, STITCH_DATA: sd1, STITCH_DATA2: sd2, ALL_STITCH_MID: allMid };
}

// ── 球種ジオメトリ事前計算 ────────────────────────────────────────────
// MLB 硬式球: C₀=9.25in, S=1.25in → R=37.394mm, y₀≈15.4mm
const C0_MLB  = 9.25 * 25.4;
const R_MLB   = C0_MLB / (2 * Math.PI);
const S_MLB   = 1.25 * 25.4;
const y0_MLB  = R_MLB * Math.sin(S_MLB / (2 * R_MLB));

// NPB M号球: D=72mm → R=36.00mm, y₀=14.00mm (実測値 / スキルドキュメント)
// stitchW=R×0.070 — 縫い目からの距離が MLB より狭く、ステッチ角度が浅い
const R_NPB   = 36.00;
const y0_NPB  = 14.00;

// 卓球ボール（ITTF 公式規格 2015〜）
//   直径: 40.0mm（許容 ±0.5mm）→ R=20.00mm
//   質量: 2.70g（許容 ±0.03g）
//   セルロイド廃止・現行 ABS 樹脂: 2015年〜
//   合わせ目（シーム）:
//     幅  = 0mm（設計上は面一: stitchW → 最小値）
//     高さ = 0mm（出っ張りなし: threadRaise = 0）
//   y₀ はボール半径に対し MLB と同比率（Thompson モデル流用）
const D_TT    = 40.00;                    // 直径 (mm) ITTF規定
const M_TT    = 2.70;                     // 質量 (g)  ITTF規定
const R_TT    = D_TT / 2;                // = 20.00mm
const y0_TT   = R_TT * (y0_MLB / R_MLB); // MLB比率で継ぎ目パラメータを流用
const W_SEAM_TT  = 0.0;   // シーム幅 (mm) — 面一（設計値）
const H_SEAM_TT  = 0.0;   // シーム高さ (mm) — 出っ張りなし

// ソフトボール（ISF/WBSC 公式規格 12インチ）
//   円周: C₀=12in=304.8mm → R=48.51mm, D≈97.0mm
//   縫い目幅: 全幅≈11.2mm → 半幅 R×0.115
//   threadRaise: 硬式球と同程度（0.9mm）
//   stitchReach: 0.50（交差接触）
const C0_SB   = 12 * 25.4;               // 円周 304.8mm
const R_SB    = C0_SB / (2 * Math.PI);   // ≈ 48.51mm
const y0_SB   = R_SB * (y0_MLB / R_MLB); // MLB比率で継ぎ目パラメータを流用

// テニスボール（ITF公式規格）
//   直径: 6.54–6.86cm → 中央値 6.70cm → R=33.50mm
//   質量: 56.0–59.4g → 中央値 57.7g
//   シーム: ゴム成型リッジ（幅広・高め）、合わせ目は白いゴムバンド
//   フェルト: 表面を覆うウール/ナイロン — 空気抵抗が大幅に増加
const D_TN    = 67.00;                    // 直径 (mm) ITF規定中央値
const M_TN    = 57.7;                     // 質量 (g)  ITF規定中央値
const R_TN    = D_TN / 2;                // = 33.50mm
const y0_TN   = R_TN * (y0_MLB / R_MLB); // MLB比率で継ぎ目パラメータを流用

const BALL_GEOMS = {
  // MLB硬式球 / NPB硬式球: 継ぎ目設計は共通（Thompson 1998 Linear モデル）
  //   stitchW半幅: R×0.105 = 3.93mm  全幅≈7.9mm  stitchReach=0.50（交差接触）
  mlb: makeBallGeom(R_MLB, y0_MLB, R_MLB * 0.105, 0.50, 0.9),

  // M号軟式球専用: 継ぎ目パラメータが MLB/NPB と異なる
  //   R=36mm, y₀=14mm(実測), 縫い目全幅9mm(半幅R×0.125)
  //   stitchReach=0.415 — stitchW変更(0.070→0.125)後も物理ギャップ1.6mmを維持
  //     |A-B|_new=9.40mm → reach=(1-1.60/9.40)/2=0.415
  //   threadRaise=0.5mm（扁平なゴム成型ステッチ）
  mgo: makeBallGeom(R_NPB, y0_NPB, R_NPB * 0.125, 0.415, 0.5),

  // 卓球ボール（ITTF 2015〜 ABS樹脂）
  //   D=40mm, R=20mm, M=2.70g
  //   シーム幅=0mm → stitchW を実質ゼロ（最小描画幅 0.002R）に設定
  //   シーム高さ=0mm → threadRaise=0（球面から出っ張りなし）
  //   stitchReach=0.50（交差点でちょうど接触 → 継続線）
  tt: makeBallGeom(R_TT, y0_TT, R_TT * 0.002, 0.50, H_SEAM_TT),

  // ソフトボール（ISF/WBSC 12インチ）
  //   R=48.51mm, y₀=19.98mm, 縫い目全幅≈11.2mm(半幅R×0.115)
  //   stitchReach=0.50（交差接触）, threadRaise=0.9mm（硬式球と同程度）
  softball: makeBallGeom(R_SB, y0_SB, R_SB * 0.115, 0.50, 0.9),

  // テニスボール（ITF公式規格）
  //   R=33.50mm — MLB の 0.896倍
  //   シーム: ゴムバンド（幅広 R×0.16）・高い隆起（threadRaise=2.0mm）
  //   stitchReach=0.50（交差接触）
  //   ※ 実際のテニスボールシームは太いゴムリッジ — stitchW を広めに設定
  tennis: makeBallGeom(R_TN, y0_TN, R_TN * 0.16, 0.50, 2.0),
};

// MLB 後方互換エイリアス（SSW 計算・SKIN 定義等の参照先）
const R              = BALL_GEOMS.mlb.R;
const ARC_DATA       = BALL_GEOMS.mlb.ARC_DATA;
const STITCH_DATA    = BALL_GEOMS.mlb.STITCH_DATA;
const STITCH_DATA2   = BALL_GEOMS.mlb.STITCH_DATA2;
const ALL_STITCH_MID = BALL_GEOMS.mlb.ALL_STITCH_MID;

// ══════════════════════════════════════════════════════════════════════
//  BALL_PHYSICS — 弾道積分に使う球種別物理定数
//
//  mass_kg      : 質量 [kg]
//  radius_m     : 半径 [m]  ← BALL_GEOMS の R と一致させる
//  CD           : 抗力係数（Reynolds 数依存を省略した定数近似）
//  pitchDist_m  : 基準投距離 [m]  弾道積分の終端・飛行時間計算に使用
//  seamH_m      : 縫い目高さ [m]  SSW k_ssw スケーリングの基準値
//  speedMin/Max : スピードスライダー範囲 [mph]
//  speedDefault : スキン切り替え時のデフォルト速度 [mph]
//  distLabel    : RK4パネルに表示する投距離ラベル文字列
//
//  SKIN.physicsKey でこのテーブルを参照する。
//  複数スキンが同じ球種物理を共有できる（DRY）。
// ══════════════════════════════════════════════════════════════════════
const BALL_PHYSICS = {
  // ── MLB / NPB 硬式球 ────────────────────────────────────────────────
  //   質量: 141.7–148.8g (5.0–5.25oz) 中央値 145g
  //   半径: BALL_GEOMS.mlb.R から導出 (C₀=9.25in)
  //   CD: 0.36 (Nathan 2012 定数近似)
  //   縫い目高さ: 0.030in = 0.762mm (MLB 公式規格)
  mlb: {
    mass_kg:      0.145,
    radius_m:     R_MLB / 1000,         // 0.03739m
    CD:           0.36,
    pitchDist_m:  18.44,                // 60.5ft（MLB マウンド→本塁）
    seamH_m:      0.030 * 0.0254,       // 0.000762m
    speedMin:     60,
    speedMax:     105,
    speedDefault: 90,
    distLabel:    '60.5ft · MLB',
  },

  // ── M号 軟式球（ゴム成型）─────────────────────────────────────────
  //   質量: 134–138g 中央値 136g (NPB 公認規格)
  //   半径: R_NPB=36.00mm（実測）
  //   CD: 0.38 — ゴム表面は革よりわずかに高抵抗
  //   縫い目高さ: ゴム成型リッジ ≈ 0.5mm（推定値）
  mgo: {
    mass_kg:      0.136,
    radius_m:     R_NPB / 1000,         // 0.036m
    CD:           0.38,
    pitchDist_m:  18.44,
    seamH_m:      0.5 / 1000,           // 0.0005m（推定）
    speedMin:     60,
    speedMax:     105,
    speedDefault: 90,
    distLabel:    '60.5ft · NPB',
  },

  // ── 卓球ボール（ITTF ABS 樹脂）─────────────────────────────────────
  //   質量: 2.70g (ITTF 規定)
  //   半径: 20.0mm
  //   CD: 0.40 — 平滑 ABS 表面
  //   pitchDist: テーブル長 2.74m（サーブ〜ネット間を基準）
  //   seamH: 0mm（合わせ目は面一設計）→ SSW ゼロ
  //   速度帯: 世界トップ級サーブ ≈ 55mph、ラリー ≈ 20-45mph
  tt: {
    mass_kg:      M_TT / 1000,           // 0.00270kg (ITTF規定)
    radius_m:     R_TT / 1000,          // 0.020m
    CD:           0.40,
    pitchDist_m:  2.74,                 // 9ft（テーブル長）
    seamH_m:      0.0,
    speedMin:     20,
    speedMax:     55,
    speedDefault: 35,
    distLabel:    '9ft · Table',
    // トッププロの最大スピン ~9000rpm を再現できるよう RPM× スライダーの上限を2倍に
    rpmMultMax:   20,
  },

  // ── ソフトボール（ISF/WBSC 12インチ）──────────────────────────────
  //   質量: 177.2–198.4g 中央値 188g (ISF 規定)
  //   半径: R_SB ≈ 48.51mm (C₀=12in)
  //   CD: 0.35 — 硬式球と同程度
  //   pitchDist: 13.11m（43ft、ファストピッチ女子）
  //   速度帯: ファストピッチ 40-70mph
  softball: {
    mass_kg:      0.188,
    radius_m:     R_SB / 1000,          // ≈0.04851m
    CD:           0.35,
    pitchDist_m:  13.11,                // 43ft（ファストピッチ）
    seamH_m:      0.030 * 0.0254,       // MLB 相当と仮定
    speedMin:     40,
    speedMax:     80,
    speedDefault: 60,
    distLabel:    '43ft · Softball',
  },

  // ── テニスボール（ITF公式規格）───────────────────────────────────────
  //   質量: 57.7g (ITF規定 56.0–59.4g 中央値)
  //   半径: R_TN=33.50mm
  //   CD: 0.55 — フェルト（毛）表面により野球球(0.36)より大幅に高抵抗
  //             フェルトの繊維が乱流を促進: 抗力係数が約1.5倍
  //   pitchDist: 23.77m（テニスコート全長、ベースライン間）
  //   seamH: ゴムシームリッジ ≈ 2.0mm（threadRaise と一致）
  //   速度帯: プロサーブ ≈ 130mph、ラリー ≈ 40–80mph
  tennis: {
    mass_kg:      M_TN / 1000,           // 0.0577kg (ITF規定)
    radius_m:     R_TN / 1000,           // 0.03350m

const _MLB_SEAM_H_REF = BALL_PHYSICS.mlb.seamH_m;

const MLB_PHYS = BALL_PHYSICS.mlb;

const I3     = () => new Float64Array([1,0,0,0,1,0,0,0,1]);
const mulM   = (A,B) => {
  const C=new Float64Array(9);
  for(let i=0;i<3;i++) for(let j=0;j<3;j++) for(let k=0;k<3;k++) C[i*3+j]+=A[i*3+k]*B[k*3+j];
  return C;
};
const rotAxis = (ax,ay,az,th) => {
  const c=Math.cos(th),s=Math.sin(th),t=1-c;
  return new Float64Array([
    t*ax*ax+c,    t*ax*ay-s*az, t*ax*az+s*ay,
    t*ax*ay+s*az, t*ay*ay+c,    t*ay*az-s*ax,
    t*ax*az-s*ay, t*ay*az+s*ax, t*az*az+c,
  ]);
};
const applyM = (m,[x,y,z]) => [m[0]*x+m[1]*y+m[2]*z, m[3]*x+m[4]*y+m[5]*z, m[6]*x+m[7]*y+m[8]*z];
const norm3  = ([x,y,z]) => { const l=Math.sqrt(x*x+y*y+z*z)||1; return [x/l,y/l,z/l]; };

// ── 革グレインテクスチャ ────────────────────────────────────────────
function hash2(x,y){const n=Math.sin(x*127.1+y*311.7)*43758.5453;return n-Math.floor(n);}
function sNoise(x,y){
  const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;
  const ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);
  return hash2(ix,iy)+(hash2(ix+1,iy)-hash2(ix,iy))*ux
       +(hash2(ix,iy+1)-hash2(ix,iy))*uy
       +(hash2(ix,iy)-hash2(ix+1,iy)-hash2(ix,iy+1)+hash2(ix+1,iy+1))*ux*uy;
}

// grainCfg: { r, g, b, noiseAmp }  ← SKIN.grain から渡す
function makeLeatherCanvas(sz = 256, grainCfg) {
  const { r: br, g: bg_, b: bb, noiseAmp } = grainCfg;
  const c = document.createElement("canvas"); c.width = c.height = sz;
  const ctx = c.getContext("2d"); const img = ctx.createImageData(sz, sz); const d = img.data;
  for (let y = 0; y < sz; y++) for (let x = 0; x < sz; x++) {
    const n = sNoise(x/52,y/20)*0.48 + sNoise(x/20,y/9)*0.30 + sNoise(x/9,y/4)*0.14 + sNoise(x/4,y/2)*0.08;
    const g = (n - 0.5) * noiseAmp;
    const idx = (y * sz + x) * 4;
    d[idx  ] = Math.min(255, Math.max(0, br  + g));
    d[idx+1] = Math.min(255, Math.max(0, bg_ + g));
    d[idx+2] = Math.min(255, Math.max(0, bb  + g * 0.75));
    d[idx+3] = 255;
  }
  ctx.putImageData(img, 0, 0); return c;
}

// ══════════════════════════════════════════════════════════════════════
//  SSW 計算モジュール
// ══════════════════════════════════════════════════════════════════════
const ZONE_SIN_THRESH = Math.sin(60 * Math.PI / 180);

function isActiveZone(rotPt) {
  const [x,y,z] = rotPt;
  const l = Math.sqrt(x*x+y*y+z*z)||1;
  return Math.abs(z / l) <= ZONE_SIN_THRESH;
}

function activeZoneWeight(rotPt) {
  const [x,y,z] = rotPt;
  const l = Math.sqrt(x*x+y*y+z*z)||1;
  const absLat = Math.abs(z / l);
  if (absLat > ZONE_SIN_THRESH) return 0;
  const baseW = 1 - absLat / ZONE_SIN_THRESH;
  const side = z < 0 ? 1.0 + 0.6 * (-z / l / ZONE_SIN_THRESH) : 0.6;
  return baseW * side;
}

// ballPhys: BALL_PHYSICS エントリ。seamH_m で SSW 強度をスケーリングする。
//   seamH_m=0 (卓球) → k_ssw=0 → SSW なし（縫い目のない球は seam-shift wake を生じない）
//   seamH_m < MLB  (M号) → k_ssw 低下
function computeSSW_weighted(rot, speedMph, rpm, efficiency, stitchMids = ALL_STITCH_MID, ballPhys = MLB_PHYS) {
  let sumX=0, sumY=0, sumZ=0, totalW=0, activeCount=0;
  const total = stitchMids.length;
  for (const mid of stitchMids) {
    const rotPt = applyM(rot, mid);
    const w = activeZoneWeight(rotPt);
    if (w > 0) {
      const wSq = w * w;
      sumX += rotPt[0] * wSq; sumY += rotPt[1] * wSq; sumZ += rotPt[2] * wSq;
      totalW += wSq; activeCount++;
    }
  }
  const ratio = totalW / (total * 1.0);
  if (activeCount === 0 || totalW < 1e-9) return { fx:0, fy:0, activeRatio:0, method:'weighted' };
  const [cx,cy] = norm3([sumX, sumY, 0]);
  // seamScale: MLB 縫い目高さを基準に正規化。seamH_m=0 なら SSW=0。
  const seamScale = ballPhys.seamH_m > 0
    ? Math.sqrt(ballPhys.seamH_m / _MLB_SEAM_H_REF)
    : 0;
  const k_ssw = 0.22 * Math.sqrt(ratio) * seamScale;
  // vFactor: computeMagnus と同じ球種別速度帯で正規化
  const dist = ballPhys.pitchDist_m;
  const [vLow, vRange] = dist < 5  ? [20, 35]
                        : dist < 16 ? [40, 30]
                        :             [60, 45];
  const vFactor = Math.max(0, Math.min(1, (speedMph - vLow) / vRange));
  const spinFactor = Math.min(1, rpm / 2000);
  const gyroPenalty = (100 - efficiency) / 100;
  const mag = k_ssw * vFactor * (0.6 + 0.4 * spinFactor) * (1 + 0.5 * gyroPenalty);
  return { fx: -cx * mag, fy: -cy * mag, activeRatio: ratio };
}

// ballPhys: 速度帯の正規化に pitchDist_m を参照。卓球など低速域でも vFactor を正しく計算。
//   speedRef_low/high: Magnus 力が有効な速度帯 [mph]
//     MLB  : 60〜105mph  → vFactor = (v-60)/45
//     卓球  : 20〜55mph  → vFactor = (v-20)/35  (参考: 世界トップ級 ≈ 55mph)
//     Soft  : 40〜70mph  → vFactor = (v-40)/30
//     mgo   : MLB と同帯域
function computeMagnus(spinAxis, speedMph, rpm, efficiency, ballPhys = MLB_PHYS) {
  const [ax,ay] = spinAxis;
  const trueSpin = rpm * efficiency / 100;
  // 球種別の有効速度帯（pitchDist_m の大小で簡易分岐）
  const dist = ballPhys.pitchDist_m;
  const [vLow, vRange] = dist < 5   ? [20, 35]  // 卓球（テーブル長 2.74m）
                        : dist < 16  ? [40, 30]  // ソフトボール
                        :              [60, 45]; // 野球系
  const vFactor  = Math.max(0, Math.min(1, (speedMph - vLow) / vRange));
  const mag      = 0.30 * Math.min(1, trueSpin / 2000) * vFactor;
  return { fx: ay * mag, fy: -ax * mag };
}

// ── RK4 弾道積分エンジン ────────────────────────────────────────────
// 旧グローバル定数は後方互換のため残す（accel等では ballPhys を使用）
const BALL_MASS   = 0.145;
const BALL_RADIUS = 0.07366 / 2;
const BALL_AREA   = Math.PI * BALL_RADIUS ** 2;
const RHO_AIR     = 1.204;
const GRAVITY     = 9.80;
const CD_BALL     = 0.36;
const PITCH_DIST  = 18.44;
const MPH_TO_MS   = 0.44704;
const M_TO_IN     = 1 / 0.0254;
const SSW_PHYS    = 0.08;

// pitchDist_m: ballPhys.pitchDist_m を渡して球種別飛行時間を計算
function flightTimeMs(speedMph, pitchDist_m = PITCH_DIST) {
  return Math.round(pitchDist_m / (speedMph * MPH_TO_MS * 0.92) * 1000);
}

// radius_m: ballPhys.radius_m を渡してスピン率 S を球種別に計算
function cliftNathan(vMag, rpmTrue, radius_m = BALL_RADIUS) {
  const omega = rpmTrue * 2 * Math.PI / 60;
  const S     = Math.max(1e-6, radius_m * omega / vMag);
  const sqS   = Math.sqrt(S);
  return 0.40 * sqS / (1 + 0.80 * sqS);
}

// phys: BALL_PHYSICS エントリ。mass_kg/radius_m/CD を球種別に使用
function accel(vx, vy, vz, sa, rpmTrue, sswFx, sswFy, phys = MLB_PHYS) {
  const ballArea = Math.PI * phys.radius_m ** 2;
  const vMag = Math.sqrt(vx*vx + vy*vy + vz*vz);
  if (vMag < 0.1) return [0, -GRAVITY, 0];
  const inv = 1 / vMag;
  const vxn = vx*inv, vyn = vy*inv, vzn = vz*inv;
  const q   = 0.5 * RHO_AIR * vMag * vMag;
  const qA  = q * ballArea;
  const fd  = qA * phys.CD / phys.mass_kg;
  const CL  = cliftNathan(vMag, rpmTrue, phys.radius_m);
  const fl  = qA * CL / phys.mass_kg;
  const [sax, say, saz] = sa;
  const mx  = say*vzn - saz*vyn;
  const my  = saz*vxn - sax*vzn;
  const mz  = sax*vyn - say*vxn;
  const sc  = qA / phys.mass_kg * SSW_PHYS;
  return [
    -fd*vxn + fl*mx + sswFx*sc,
    -fd*vyn + fl*my + sswFy*sc - GRAVITY,
    -fd*vzn + fl*mz,
  ];
}

function rk4Step(vx, vy, vz, sa, rpmTrue, sswFx, sswFy, dt, phys = MLB_PHYS) {
  const k1 = accel(vx,            vy,            vz,            sa, rpmTrue, sswFx, sswFy, phys);
  const k2 = accel(vx+k1[0]*dt/2, vy+k1[1]*dt/2, vz+k1[2]*dt/2, sa, rpmTrue, sswFx, sswFy, phys);
  const k3 = accel(vx+k2[0]*dt/2, vy+k2[1]*dt/2, vz+k2[2]*dt/2, sa, rpmTrue, sswFx, sswFy, phys);
  const k4 = accel(vx+k3[0]*dt,   vy+k3[1]*dt,   vz+k3[2]*dt,   sa, rpmTrue, sswFx, sswFy, phys);
  return [
    vx + (k1[0]+2*k2[0]+2*k3[0]+k4[0])/6*dt,
    vy + (k1[1]+2*k2[1]+2*k3[1]+k4[1])/6*dt,
    vz + (k1[2]+2*k2[2]+2*k3[2]+k4[2])/6*dt,
  ];
}

// ballPhys: BALL_PHYSICS エントリ。pitchDist_m / mass_kg / radius_m / CD / seamH_m を使用
function integrateTrajectory(speedMph, rpmTotal, efficiency, spinAxis, rot, stitchMids = ALL_STITCH_MID, ballPhys = MLB_PHYS) {
  const v0  = speedMph * MPH_TO_MS;
  const dt  = 0.004;
  const dist = ballPhys.pitchDist_m;
  const rpmTrue = rpmTotal * efficiency / 100;
  const sswR = computeSSW_weighted(rot, speedMph, rpmTotal, efficiency, stitchMids, ballPhys);
  const sswFx = sswR.fx, sswFy = sswR.fy;
  let [bx,by,bz,bvx,bvy,bvz] = [0,0,0,0,0,v0];
  while (bz < dist) {
    const dv = accel(bvx,bvy,bvz, [0,0,1], 0, 0, 0, ballPhys);
    bvx+=dv[0]*dt; bvy+=dv[1]*dt; bvz+=dv[2]*dt;
    bx+=bvx*dt; by+=bvy*dt; bz+=bvz*dt;
  }
  let [mx,my,mz,mvx,mvy,mvz] = [0,0,0,0,0,v0];
  while (mz < dist) {
    [mvx,mvy,mvz] = rk4Step(mvx,mvy,mvz, spinAxis, rpmTrue, 0, 0, dt, ballPhys);
    mx+=mvx*dt; my+=mvy*dt; mz+=mvz*dt;
  }
  let [tx,ty,tz,tvx,tvy,tvz] = [0,0,0,0,0,v0];
  while (tz < dist) {
    [tvx,tvy,tvz] = rk4Step(tvx,tvy,tvz, spinAxis, rpmTrue, sswFx, sswFy, dt, ballPhys);
    tx+=tvx*dt; ty+=tvy*dt; tz+=tvz*dt;
  }
  const magH = (mx-bx)*M_TO_IN, magV = (my-by)*M_TO_IN;
  const totH = (tx-bx)*M_TO_IN, totV = (ty-by)*M_TO_IN;
  return {
    magBreakH: magH,   magBreakV: magV,
    sswBreakH: totH-magH, sswBreakV: totV-magV,
    totalBreakH: totH, totalBreakV: totV,
  };
}

  //    hue マッピング:
  //      lat=0   (赤道) → 60°  黄
  //      lat=+1  (北極) → 300° マゼンタ
  //      lat=−1  (南極) → 180° シアン

  // ────────────────────────────────────────────────────────
  gaming: {
    label: 'GAMING',
    accentColor: '#aaff00',    // レインボー赤道付近の黄緑 — ボタンアクセント色
    physicsKey: 'mlb',
    ballSpec: "Gaming · Skeleton · Rainbow Stitches · C₀=9.25\" · R=" + R.toFixed(2) + "mm",
    seamGeom: 'mlb',
    back: null,
    bg: {
      inner: '#04030e',
      outer: '#010108',
      bgFn: (ctx, W, cx, cy, ballR) => {
        // 深宇宙 + 薄いグリッドライン
        const bg = ctx.createRadialGradient(cx*0.6, cy*0.5, 0, cx, cy, W*0.82);
        bg.addColorStop(0, '#080618'); bg.addColorStop(1, '#010108');
        ctx.fillStyle = bg; ctx.fillRect(0, 0, W, W);
        // グリッド（薄いシアン）
        ctx.strokeStyle = 'rgba(0,230,255,0.055)'; ctx.lineWidth = 0.5;
        const gStep = W / 10;
        for (let x = 0; x <= W; x += gStep) {
          ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, W); ctx.stroke();
        }
        for (let y = 0; y <= W; y += gStep) {
          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
        }

      guideColor: 'rgba(0,220,255,0.10)',
      guideWidth: 0.004,

    stitch: {
      // colorFn: rotMid（回転後3D座標）と spinAxis（スピン軸）を受け取り
      //          { main, shadow, highlight } を返す
      //   lat: [-1, +1]  spinAxis への射影（正規化）
      //   hue: 赤道=60°(黄), 北極=300°(マゼンタ), 南極=180°(シアン)
      colorFn: (rotMid, spinAxis) => {
        const rmLen = Math.sqrt(rotMid[0]**2 + rotMid[1]**2 + rotMid[2]**2) || 1;
        const lat   = (rotMid[0]*spinAxis[0] + rotMid[1]*spinAxis[1] + rotMid[2]*spinAxis[2]) / rmLen;
        // lat: +1→−60°=300°(magenta)  0→60°(yellow)  −1→180°(cyan)
        const hue   = (((60 - lat * 240) % 360) + 360) % 360;
        return {
          main:      `hsl(${hue.toFixed(1)},100%,62%)`,
          shadow:    `hsla(${hue.toFixed(1)},100%,22%,0.88)`,
          highlight: `hsla(${hue.toFixed(1)},100%,88%,0.50)`,

      shadowW: 1.40,
      mainW:   1.00,
      hlW:     0.30,
